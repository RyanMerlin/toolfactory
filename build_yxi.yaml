name: Build YXI

on:
  pull_request:
    paths:
      - "tools/**/spec.yaml"
      - "tools/**/prompts/**"
      - "toolsmith/**"
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python: [ "3.8", "3.10" ]

    steps:
      - uses: actions/checkout@v4

      # Node requirement is still documented as Node 14 for CLI setup. :contentReference[oaicite:11]{index=11}
      - uses: actions/setup-node@v4
        with:
          node-version: "14"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install toolsmith + deps
        run: |
          python -m pip install --upgrade pip
          pip install -e toolsmith

      - name: Generate/update tools for this Python target
        run: |
          python -m toolsmith.build_all --python ${{ matrix.python }}

      - name: Upload YXI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yxi-${{ matrix.python }}
          path: dist/**/*.yxi
