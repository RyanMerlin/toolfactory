schema_version: 0.1

tool:
  slug: column_profiler
  name: Column Profiler
  description: Summarizes each column (nulls, distincts, top values).
  category: SDK Examples

target:
  alteryx_version: "2024.1"   # <-- the new knob
  # optional: pin overrides when needed
  python_version: "auto"      # auto resolves to 3.10 for 2024.1+, else 3.8
  sdk_pins: "auto"            # auto resolves package pins per target

# If you want one spec to build multiple YXIs (recommended), change target: → targets:
# targets:
#   - alteryx_version: "2023.2"
#   - alteryx_version: "2024.1"


io:
  inputs:
    - name: Input
      anchor: "Input"
  outputs:
    - name: Profile
      anchor: "Output"

ui:
  fields:
    - key: max_distinct
      label: Max distinct values to compute
      type: number
      default: 1000

engine:
  behavior: |
    For each input column, output: inferred_type, null_count, distinct_count, top_values (up to 10).
