schema_version: 0.1

tool:
  slug: column_profiler
  name: Column Profiler
  description: Summarize each column (nulls, distincts, top values).
  category: "AI Toolsmith MVP"

target:
  alteryx_version: "2025.2"

ui:
  fields:
    - key: max_distinct
      label: Max distinct values
      type: number
      default: 1000

io:
  inputs:
    - name: Input
      anchor: "Input"
  outputs:
    - name: Profile
      anchor: "Output"

engine:
  behavior: |
    For each input column, output: inferred_type, null_count, distinct_count, top_values (up to 10).
