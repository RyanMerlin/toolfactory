name: release-yxi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "16.20.1"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install ayx-plugin-cli==1.3.1 ayx-python-sdk==2.5.1
          pip install -e .

      - name: Validate and enforce deterministic state
        shell: pwsh
        run: |
          toolsmith validate-all
          toolsmith lock-all --check
          toolsmith reconcile-all --check

      - name: Build all YXIs
        shell: pwsh
        run: |
          toolsmith build-all

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: tools/*/dist/*.yxi
