name: build-yxi

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "16.20.1"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install ayx-plugin-cli==1.3.1 ayx-python-sdk==2.5.1
          pip install -e .

      - name: Validate specs
        shell: pwsh
        run: |
          toolsmith validate-all

      - name: Check locks are up-to-date
        shell: pwsh
        run: |
          toolsmith lock-all --check

      - name: Check workspace drift
        shell: pwsh
        run: |
          toolsmith reconcile-all --check

      - name: Build all YXIs
        shell: pwsh
        run: |
          toolsmith build-all

      - name: Upload YXI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yxi
          path: tools/*/dist/*.yxi
